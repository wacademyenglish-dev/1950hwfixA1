<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOLF LABS | Homework: The 1950s Life (A1)</title>
    
    <!-- Epic Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- WOLF LABS ENGINE V2.1: SUPREME DESIGN (REFINED PALETTE) --- */
        :root {
            --bg: #050505;
            --surface: rgba(20, 18, 15, 0.85); /* Nostalgic warm dark glass */
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #1AA34A; /* Refined Emerald Green */
            --accent-glow: rgba(26, 163, 74, 0.25);
            --correct: #1AA34A;
            --incorrect: #E50914; 
            --text-main: #FFFFFF;
            --text-dim: #B3B3B3;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-body); }

        body {
            background: linear-gradient(to top, rgba(5,4,3,1) 5%, rgba(5,4,3,0.85) 100%), 
                        url('https://images.unsplash.com/photo-1511884642898-4c92249e20b6?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- AMBIENT GLOW --- */
        .ambient-glow {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 450px; height: 450px; background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { width: 350px; height: 350px; background: #e59400; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes floatOrb { 0% { transform: translate(0,0); } 100% { transform: translate(40px, 40px); } }

        /* --- HEADER --- */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(5, 4, 3, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1rem; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--accent); }
        
        .progress-bar-container {
            position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.05);
        }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent-glow); }

        /* --- MAIN CONTAINER --- */
        main {
            flex: 1;
            margin-top: 60px;
            margin-bottom: 80px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        .step {
            position: absolute;
            width: 100%;
            max-width: 650px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(30px);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: none;
        }
        .step::-webkit-scrollbar { display: none; }

        .step.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
            visibility: visible;
            position: relative;
        }

        /* --- GLASS CARD --- */
        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        /* --- TYPOGRAPHY --- */
        .tag { color: var(--accent); font-size: 0.8rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        h1 { font-family: var(--font-display); font-size: 3.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; text-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .question-text { font-size: 1.3rem; font-weight: 700; line-height: 1.6; color: #fff; margin-bottom: 25px; }

        /* --- MULTIPLE CHOICE --- */
        .mc-options { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .mc-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: #fff;
            padding: 20px 25px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: left;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .mc-btn:hover { background: var(--surface-hover); border-color: var(--accent); transform: translateX(5px); }
        
        .mc-btn.correct { 
            border-color: var(--correct); 
            background: var(--accent); 
            color: #050505;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .mc-btn.correct::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; }
        
        .mc-btn.incorrect { border-color: var(--incorrect); background: rgba(229, 9, 20, 0.1); }
        .mc-btn.incorrect::after { content: '\f00d'; font-family: 'Font Awesome 6 Free'; font-weight: 900; }

        /* --- SENTENCE BUILDER (SOLID GREEN, BLACK TEXT, WITH UNDO) --- */
        .drop-zone {
            min-height: 120px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(26, 163, 74, 0.1); }
        
        .word-bank { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .word-chip {
            padding: 14px 28px;
            background: var(--accent);
            border: none;
            border-radius: 500px;
            color: #050505;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 5px 15px rgba(26, 163, 74, 0.3);
        }
        .word-chip:hover { filter: brightness(1.1); transform: translateY(-4px); box-shadow: 0 8px 20px rgba(26, 163, 74, 0.4); }
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* --- CHAT SCENARIO --- */
        .chat-container { display: flex; flex-direction: column; gap: 20px; width: 100%; margin-top: 10px;}
        .msg { padding: 18px 25px; border-radius: 20px; max-width: 85%; font-size: 1.15rem; line-height: 1.5; text-align: left; border: 1px solid rgba(255,255,255,0.05);}
        .msg.friend { background: #282828; align-self: flex-start; border-bottom-left-radius: 4px; color: #fff; }
        .msg.you { background: var(--accent); color: #050505; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 800; box-shadow: 0 5px 20px var(--accent-glow);}
        .chat-option { padding: 20px 25px; background: rgba(255,255,255,0.03); border-radius: 16px; cursor: pointer; text-align: left; color: #fff; font-weight: 700; border: 1px solid var(--border); transition: 0.3s;}
        .chat-option:hover { border-color: var(--accent); background: var(--surface-hover); transform: translateX(8px);}

        /* --- ERROR FINDER --- */
        .highlight-zone { padding: 40px 30px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);}
        .error-sentence { font-size: 1.7rem; word-spacing: 6px; line-height: 1.8; font-weight: 700; color: #fff;}
        .error-word { display: inline-block; padding: 6px 12px; margin: 4px 0; cursor: pointer; border-radius: 10px; transition: 0.3s; border: 1px solid transparent;}
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); transform: scale(1.05); }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(to top, rgba(5,4,3,1), rgba(5,4,3,0.8));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .next-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px 0;
            border-radius: 500px;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            width: 100%;
            max-width: 600px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
        }
        .next-btn:disabled { opacity: 0.2; pointer-events: none; }
        .next-btn.ready { background: var(--accent); color: #050505; box-shadow: 0 10px 30px var(--accent-glow); transform: translateY(-3px); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-8px); } 50% { transform: translateX(8px); } }

    </style>
</head>
<body>

    <div class="ambient-glow">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="header">
        <div class="logo"><i class="fa-solid fa-gamepad" style="color:var(--accent); margin-right: 10px;"></i>WOLF LABS <span>|</span> HOMEWORK</div>
        <div style="color: var(--text-dim); font-size: 0.9rem; font-weight: 800; letter-spacing: 2px;" id="step-counter">MISSION 1/9</div>
        <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="homework-container">
        <!-- Intro -->
        <section class="step active" id="step-0">
            <div class="glass-card">
                <span class="tag">TRAINING MISSION (A1)</span>
                <h1>The 1950s<br>Life</h1>
                <p class="subtitle" style="font-size: 1.2rem; margin-bottom: 30px;">Complete 8 challenges to master the vintage vocabulary and the Simple Present.</p>
                
                <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; text-align: left;">
                    <i class="fa-solid fa-bullseye" style="font-size: 2rem; color: var(--accent);"></i>
                    <div><h3 style="font-size: 1.1rem; margin:0; color: #fff;">Logic Check</h3><p style="margin:0; font-size: 0.9rem; color: var(--text-dim);">Test your vocabulary</p></div>
                </div>
                <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 20px; text-align: left;">
                    <i class="fa-solid fa-bug" style="font-size: 2rem; color: var(--accent);"></i>
                    <div><h3 style="font-size: 1.1rem; margin:0; color: #fff;">Error Detection</h3><p style="margin:0; font-size: 0.9rem; color: var(--text-dim);">Find the grammar mistake</p></div>
                </div>
                <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 16px; display: flex; align-items: center; gap: 20px; text-align: left;">
                    <i class="fa-solid fa-puzzle-piece" style="font-size: 2rem; color: var(--accent);"></i>
                    <div><h3 style="font-size: 1.1rem; margin:0; color: #fff;">Sentence Builder</h3><p style="margin:0; font-size: 0.9rem; color: var(--text-dim);">Assemble correct habits</p></div>
                </div>
            </div>
        </section>

        <!-- Exercises will be injected via JS -->
    </main>

    <div class="bottom-bar">
        <button class="next-btn" id="nextBtn" onclick="nextStep()">START HOMEWORK</button>
    </div>

    <script>
        // Note: Using typographic apostrophe (doesn’t / don’t) prevents any JS injection errors
        const exercises = [
            // 1: VOCAB
            { type: 'mc', tag: 'VOCABULARY', text: 'Old, but very good and beautiful clothes are...', options: [{text: 'Modern', correct: false}, {text: 'Vintage', correct: true}, {text: 'Authentic', correct: false}] },
            
            // 2: VOCAB
            { type: 'mc', tag: 'VOCABULARY', text: 'A machine in the kitchen that keeps food cold is a...', options: [{text: 'Fridge', correct: true}, {text: 'Routine', correct: false}, {text: 'Dress', correct: false}] },
            
            // 3: GRAMMAR (Affirmative)
            { type: 'mc', tag: 'GRAMMAR: SIMPLE PRESENT', text: '"Lacey ________ in an old house."', options: [{text: 'live', correct: false}, {text: 'lives', correct: true}, {text: 'living', correct: false}] },
            
            // 4: GRAMMAR (Negative)
            { type: 'mc', tag: 'GRAMMAR: NEGATIVE', text: '"She ________ like modern phones."', options: [{text: 'doesn’t', correct: true}, {text: 'don’t', correct: false}, {text: 'isn’t', correct: false}] },
            
            // 5: BUILDER (Affirmative)
            { type: 'builder', tag: 'SENTENCE BUILDER', text: 'Unscramble the words to describe where you live.', target: ['I', 'live', 'in', 'an', 'old', 'house'], chips: ['house', 'I', 'old', 'live', 'in', 'an'] },
            
            // 6: BUILDER (Negative)
            { type: 'builder', tag: 'SENTENCE BUILDER', text: 'Unscramble the words to form a negative sentence.', target: ['She', 'doesn’t', 'like', 'modern', 'things'], chips: ['like', 'things', 'She', 'doesn’t', 'modern'] },
            
            // 7: ERROR DETECTION
            { type: 'error', tag: 'ERROR DETECTION', text: 'Tap the wrong word.', sentence: ['My', 'brother', 'don’t', 'like', 'vintage', 'clothes.'], correctIdx: 2 },
            
            // 8: CHAT SCENARIO
            { type: 'chat', tag: 'LIVE CHAT', msg: "Does she live in a new house?", options: [{text: "No, she doesn’t. She lives in an old house.", correct: true}, {text: "No, she don’t. She live in an old house.", correct: false}] }
        ];

        let currentStep = 0;
        let buildState = {};

        function initExercises() {
            const container = document.getElementById('homework-container');
            exercises.forEach((ex, idx) => {
                const section = document.createElement('section');
                section.className = 'step';
                section.id = `step-${idx + 1}`;
                let content = `<div class="tag">${ex.tag}</div>`;
                
                if (ex.type === 'mc') {
                    content += `<div class="glass-card"><p class="question-text">${ex.text}</p><div class="mc-options">${ex.options.map(opt => `<button class="mc-btn" data-correct="${opt.correct}" onclick="selectOption(this)">${opt.text}</button>`).join('')}</div></div>`;
                } else if (ex.type === 'builder') {
                    const dzId = `dz-${idx}`;
                    buildState[dzId] = [];
                    // Protect against HTML parsing bugs
                    const targetStr = JSON.stringify(ex.target).replace(/"/g, '&quot;');
                    content += `<div class="glass-card"><p class="question-text">${ex.text}</p><div class="drop-zone" id="${dzId}" data-target="${targetStr}"></div><div class="word-bank">${ex.chips.map(word => `<div class="word-chip" onclick="moveWord(this, '${dzId}')">${word}</div>`).join('')}</div></div>`;
                } else if (ex.type === 'error') {
                    content += `<div class="glass-card"><p class="question-text">${ex.text}</p><div class="highlight-zone"><div class="error-sentence">${ex.sentence.map((word, wIdx) => `<span class="error-word" onclick="genericCorrect(this, ${wIdx === ex.correctIdx})">${word}</span>`).join(' ')}</div></div></div>`;
                } else if (ex.type === 'chat') {
                    content += `<div class="glass-card"><p class="question-text" style="font-size:1rem; margin-bottom:10px;">Choose the correct grammatical reply.</p><div class="chat-container" id="chat-${idx}"><div class="msg friend">${ex.msg}</div><div class="mc-options">${ex.options.map(opt => `<button class="chat-option" data-correct="${opt.correct}" onclick="handleChat(this, ${opt.correct}, 'chat-${idx}')">${opt.text}</button>`).join('')}</div></div></div>`;
                }

                section.innerHTML = content;
                container.appendChild(section);
            });

            // Outro
            const outro = document.createElement('section');
            outro.className = 'step';
            outro.id = `step-${exercises.length + 1}`;
            outro.innerHTML = `<div class="glass-card" style="border-color:var(--accent); background:rgba(26,163,74,0.1);"><div style="width:100px; height:100px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 30px auto;"><i class="fa-solid fa-check" style="font-size:3rem; color:#050505;"></i></div><h1 style="color:var(--accent);">Mission Complete</h1><p class="subtitle" style="color:#fff; font-weight:700;">Your homework data has been successfully processed and synced to the teacher's database.</p></div>`;
            container.appendChild(outro);
        }

        function updateUI() {
            const steps = document.querySelectorAll('.step');
            const total = steps.length;
            const nextBtn = document.getElementById('nextBtn');
            const progressBar = document.getElementById('progressBar');
            const stepCounter = document.getElementById('step-counter');

            steps.forEach((s, i) => {
                if(i === currentStep) {
                    s.classList.remove('exiting');
                    s.classList.add('active');
                } else if (i < currentStep) {
                    s.classList.remove('active');
                    s.classList.add('exiting');
                } else {
                    s.classList.remove('active', 'exiting');
                }
            });

            progressBar.style.width = `${(currentStep / (total - 1)) * 100}%`;
            stepCounter.innerText = currentStep === 0 ? "START" : currentStep === total - 1 ? "FINISH" : `MISSION ${currentStep}/${total - 2}`;

            if(currentStep === 0) { 
                nextBtn.innerText = "START HOMEWORK"; 
                nextBtn.disabled = false; 
                nextBtn.classList.add('ready'); 
            } else if(currentStep === total - 1) { 
                nextBtn.innerText = "CLOSE SYSTEM"; 
                nextBtn.disabled = false; 
                nextBtn.classList.add('ready'); 
            } else { 
                nextBtn.innerText = "NEXT CHALLENGE"; 
                nextBtn.disabled = true; 
                nextBtn.classList.remove('ready'); 
            }
        }

        function nextStep() {
            if (currentStep === document.querySelectorAll('.step').length - 1) {
                alert("Session logged. You can safely close this window.");
                return;
            }
            currentStep++; 
            updateUI(); 
        }

        function selectOption(btn) {
            const parent = btn.closest('.step');
            if (parent.classList.contains('done')) return;
            if (btn.dataset.correct === "true") {
                btn.classList.add('correct'); parent.classList.add('done');
                parent.querySelectorAll('.mc-btn').forEach(b => { if(b!==btn) { b.style.opacity = '0.3'; b.style.pointerEvents = 'none'; } });
                document.getElementById('nextBtn').disabled = false; document.getElementById('nextBtn').classList.add('ready');
            } else { 
                btn.classList.add('incorrect'); btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                setTimeout(() => btn.style.animation = '', 400); 
            }
        }

        function handleChat(btn, isCorrect, chatId) {
            const container = document.getElementById(chatId);
            const parent = btn.closest('.step');
            if (parent.classList.contains('done')) return;
            if (isCorrect) {
                container.querySelectorAll('.chat-option').forEach(o => o.style.display = 'none');
                container.innerHTML += `<div class="msg you" style="display:block;">${btn.innerText}</div>`;
                parent.classList.add('done');
                document.getElementById('nextBtn').disabled = false; document.getElementById('nextBtn').classList.add('ready');
            } else { 
                btn.style.borderColor = 'var(--incorrect)'; btn.style.background = 'rgba(233, 20, 41, 0.15)'; btn.style.color = '#fff';
                btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                setTimeout(() => { btn.style.animation = ''; btn.style.borderColor = 'var(--border)'; btn.style.background = 'rgba(255,255,255,0.03)'; }, 800); 
            }
        }

        function genericCorrect(btn, isCorrect) {
            const parent = btn.closest('.step');
            if (parent.classList.contains('done')) return;
            if (isCorrect) {
                btn.style.background = 'var(--correct)'; btn.style.color = '#050505'; parent.classList.add('done');
                btn.parentElement.querySelectorAll('.error-word').forEach(w => { if(w!==btn) w.style.opacity = '0.3'; w.style.pointerEvents = 'none'; });
                document.getElementById('nextBtn').disabled = false; document.getElementById('nextBtn').classList.add('ready');
            } else { 
                btn.style.background = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.animation = 'shake 0.4s'; 
                setTimeout(() => { btn.style.animation = ''; btn.style.background = 'transparent'; }, 800); 
            }
        }

        function moveWord(chip, dzId) {
            if(chip.classList.contains('used')) return;
            const dz = document.getElementById(dzId);
            const targetArray = JSON.parse(dz.getAttribute('data-target').replace(/&quot;/g, '"'));
            
            const newChip = document.createElement('div');
            newChip.className = 'word-chip'; 
            newChip.innerText = chip.innerText;
            newChip.style.background = '#fff';
            newChip.style.color = '#050505';
            newChip.style.border = 'none';
            
            if (!chip.id) chip.id = 'c_' + Math.random().toString(36).substr(2, 5);
            newChip.dataset.src = chip.id;
            
            // UNDO Mechanic
            newChip.onclick = function() {
                if(dz.classList.contains('success')) return; 
                dz.removeChild(this); 
                document.getElementById(this.dataset.src).classList.remove('used');
                const idx = buildState[dzId].lastIndexOf(this.innerText);
                if(idx !== -1) buildState[dzId].splice(idx, 1);
            };
            
            dz.appendChild(newChip); 
            chip.classList.add('used');
            buildState[dzId].push(chip.innerText);
            
            if(buildState[dzId].length === targetArray.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success');
                    Array.from(dz.children).forEach(c => {
                        c.style.background = 'var(--correct)';
                        c.style.color = '#050505';
                        c.style.cursor = 'default';
                        c.style.pointerEvents = 'none';
                    });
                    document.getElementById('nextBtn').disabled = false; 
                    document.getElementById('nextBtn').classList.add('ready');
                } else {
                    dz.style.borderColor = 'var(--incorrect)'; 
                    dz.style.animation = 'shake 0.4s';
                    dz.style.pointerEvents = 'none'; 
                    
                    setTimeout(() => { 
                        dz.innerHTML = ''; 
                        dz.style.borderColor = 'rgba(255, 255, 255, 0.2)'; 
                        dz.style.animation = ''; 
                        dz.style.pointerEvents = 'auto';
                        buildState[dzId] = []; 
                        chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used')); 
                    }, 1000);
                }
            }
        }

        window.onload = () => { initExercises(); updateUI(); }
    </script>
</body>
</html>
